<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Alexander Kwok</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script defer src="/_vercel/insights/script.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050507;--bg2:#08080C;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--teal:#0CCFBE;--teal2:#0D9488;--teal-glow:rgba(12,207,190,0.1);--white:#FAFCFF;--off:#8B9AB5;--dim:#3D4F63;--display:'Bricolage Grotesque',sans-serif;--sans:'Instrument Sans',sans-serif;--mono:'JetBrains Mono',monospace;}
body{background:var(--bg);color:var(--white);font-family:var(--sans);font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;min-height:100vh}
nav{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(5,5,7,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:var(--display);font-size:15px;font-weight:700;letter-spacing:-.03em;color:var(--white);text-decoration:none;display:flex;align-items:center;gap:8px}
.nav-pip{width:5px;height:5px;background:var(--teal);border-radius:50%;animation:blink 2.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:48px;text-align:center}
.error-code{font-family:var(--display);font-size:clamp(6rem,15vw,12rem);font-weight:800;letter-spacing:-.06em;color:transparent;background:linear-gradient(120deg,var(--teal) 0%,#5EEAD4 60%,var(--teal) 100%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;animation:shimmer 4s linear infinite;line-height:1;margin-bottom:16px}
@keyframes shimmer{to{background-position:200% center}}
.error-msg{font-family:var(--display);font-size:clamp(1.5rem,3vw,2.5rem);font-weight:700;letter-spacing:-.03em;color:var(--white);margin-bottom:16px}
.error-desc{font-size:17px;color:var(--off);max-width:400px;margin:0 auto 40px;line-height:1.7}
.back-btn{font-family:var(--sans);font-size:14px;font-weight:600;background:var(--teal);color:#000;padding:14px 30px;border-radius:100px;text-decoration:none;transition:all .22s;display:inline-block}
.back-btn:hover{background:#5EEAD4;transform:translateY(-2px);box-shadow:0 12px 32px rgba(12,207,190,.35)}
footer{padding:36px 48px;border-top:1px solid var(--border)}
.footer-inner{max-width:1100px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.fl-left{font-family:var(--mono);font-size:11px;color:var(--dim)}
.fl-links{display:flex;gap:28px}
.fl-links a{font-family:var(--mono);font-size:11px;color:var(--dim);text-decoration:none;letter-spacing:.06em;transition:color .2s}
.fl-links a:hover{color:var(--teal)}
@media(max-width:768px){nav,main,footer{padding-left:20px;padding-right:20px}.footer-inner{flex-direction:column;gap:16px}}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo"><span class="nav-pip"></span>Alexander Kwok</a>
</nav>
<main>
  <div>
    <div class="error-code">404</div>
    <div class="error-msg">Page not found.</div>
    <p class="error-desc">The page you are looking for does not exist or has been moved. Let me take you somewhere useful.</p>
    <a href="index.html" class="back-btn">Back to home</a>
  </div>
</main>
<footer>
  <div class="footer-inner">
    <div class="fl-left">&copy; 2026 Alexander Kwok &nbsp;&middot;&nbsp; Sydney, Australia</div>
    <div class="fl-links">
      <a href="https://www.linkedin.com/in/alexander-k-ds/" target="_blank">LinkedIn</a>
      <a href="writing.html">Writing</a>
      <a href="index.html#newsletter">Newsletter</a>
    </div>
  </div>
</footer>
</body>
</html>
